<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otimização de Rotas - TSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div id="telaInicial" class="d-flex flex-column justify-content-center align-items-center vh-100 bg-light">
        <div class="text-center">
            <img src="imagens/logoOtimizacaoDeRotas.png" alt="Logo Otimização de Rotas" style="max-width: 300px;" class="mb-4">
            <h1 class="display-5 fw-bold mb-4">Otimização de rotas com Algoritmo Genético</h1>
            <button id="botaoComecar" class="btn btn-primary btn-lg px-5 shadow">Iniciar Otimização</button>
        </div>
    </div>

    <div id="telaConfiguracao" class="container mt-5 d-none">
        <div class="text-center mb-5">
            <img src="imagens/logoOtimizacaoDeRotas.png" alt="Logo" style="max-width: 120px;">
            <h2 class="mt-3">Configuração e Envio de Dados</h2>
        </div>

        <div class="card shadow-sm p-4 mb-5">
            <form id="formularioUpload" class="row g-3">
                
                <h5 class="mt-2 fw-bold text-primary">Dados da Moto</h5>
                <div class="col-md-4">
                    <label for="consumoMedio" class="form-label">Consumo Médio (km/L)</label>
                    <input type="number" step="0.1" class="form-control" id="consumoMedio" required>
                </div>
                <div class="col-md-4">
                    <label for="capacidadeTanque" class="form-label">Capacidade do Tanque (Litros)</label>
                    <input type="number" step="0.1" class="form-control" id="capacidadeTanque" required>
                </div>
                <div class="col-md-4">
                    <label for="combustivelAtual" class="form-label">Combustível Atual (Litros)</label>
                    <input type="number" step="0.1" class="form-control" id="combustivelAtual" required>
                </div>

                <hr class="mt-4">

                <h5 class="mt-2 fw-bold text-primary">Parâmetros do Algoritmo Genético</h5>
                <div class="col-md-3">
                    <label for="formaSelecao" class="form-label">Forma de Seleção</label>
                    <select id="formaSelecao" class="form-select" required>
                        <option value="torneio">Torneio</option>
                        <option value="roleta">Roleta</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="mutacao" class="form-label">Mutação</label>
                    <select id="mutacao" class="form-select" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="tamanhoPopulacao" class="form-label">Tamanho da População</label>
                    <input type="number" class="form-control" id="tamanhoPopulacao" min="4" max="20" placeholder="Ex: 4 a 20" required>
                </div>
                <div class="col-md-3">
                    <label for="limiteGeracoes" class="form-label">Limite de Gerações</label>
                    <input type="number" class="form-control" id="limiteGeracoes" min="10" max="1000" placeholder="Ex: 10 a 1000" required>
                </div>

                <hr class="mt-4">

                <div class="col-12 mb-4">
                    <label for="arquivoCSV" class="form-label fw-bold">Informações dos Lugares (Arquivo CSV)</label>
                    <input class="form-control" type="file" id="arquivoCSV" accept=".csv" required>
                </div>

                <div class="col-12 text-center">
                    <button type="submit" id="botaoEnviar" class="btn btn-primary btn-lg px-5">
                        <span class="spinner-border spinner-border-sm d-none" id="indicadorCarregamento" role="status" aria-hidden="true"></span>
                        <span id="textoBotao">Enviar Dados e Arquivo</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-light text-center text-muted py-4 mt-5 border-top">
        <div class="container">
            <p class="mb-1">Otimização de Rotas - TSP com Algoritmo Genético</p>
            <small>&copy; 2026 Sistema de Rotas Otimizadas.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
