<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otimização de Rotas - TSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div id="telaInicial" class="d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="text-center p-5 bloco-formulario">
            <img src="imagens/logoOtimizacaoDeRotas.png" alt="Logo Otimização de Rotas" style="max-width: 250px;" class="mb-4">
            <h1 class="display-5 fw-bold mb-4 texto-destaque">Otimização de Rotas com Algoritmo Genético</h1>
            <button id="botaoComecar" class="btn btn-primario btn-lg px-5 shadow">Iniciar Otimização</button>
        </div>
    </div>

    <div id="telaConfiguracao" class="container mt-5 d-none">
        <div class="text-center mb-5">
            <img src="imagens/logoOtimizacaoDeRotas.png" alt="Logo" style="max-width: 100px;">
            <h2 class="mt-3 fw-bold texto-destaque">Configuração e Envio de Dados</h2>
        </div>

        <form id="formularioUpload">
            <div class="row g-4">
                
                <div class="col-lg-6">
                    <div class="bloco-formulario h-100">
                        <h5 class="fw-bold texto-destaque mb-4">
                            <i class="bi bi-bicycle me-2"></i>Dados da Moto
                        </h5>
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="consumoMedio" class="form-label fw-semibold">Consumo Médio (km/L)</label>
                                <input type="number" step="0.1" class="form-control" id="consumoMedio" required>
                            </div>
                            <div class="col-12">
                                <label for="capacidadeTanque" class="form-label fw-semibold">Capacidade do Tanque (Litros)</label>
                                <input type="number" step="0.1" class="form-control" id="capacidadeTanque" required>
                            </div>
                            <div class="col-12">
                                <label for="combustivelAtual" class="form-label fw-semibold">Combustível Atual (Litros)</label>
                                <input type="number" step="0.1" class="form-control" id="combustivelAtual" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="bloco-formulario h-100">
                        <h5 class="fw-bold texto-destaque mb-4">
                            <i class="bi bi-gear-fill me-2"></i>Parâmetros do Algoritmo
                        </h5>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="formaSelecao" class="form-label fw-semibold">Seleção</label>
                                <select id="formaSelecao" class="form-select" required>
                                    <option value="torneio">Torneio</option>
                                    <option value="roleta">Roleta</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="mutacao" class="form-label fw-semibold">Mutação</label>
                                <select id="mutacao" class="form-select" required>
                                    <option value="sim">Sim</option>
                                    <option value="nao">Não</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="tamanhoPopulacao" class="form-label fw-semibold">Tamanho da População</label>
                                <input type="number" class="form-control" id="tamanhoPopulacao" min="4" max="20" placeholder="Ex: 4 a 20" required>
                            </div>
                            <div class="col-12">
                                <label for="limiteGeracoes" class="form-label fw-semibold">Limite de Gerações</label>
                                <input type="number" class="form-control" id="limiteGeracoes" min="10" max="1000" placeholder="Ex: 10 a 1000" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="bloco-formulario text-center p-5">
                        <h5 class="fw-bold texto-destaque mb-4">
                            <i class="bi bi-file-earmark-spreadsheet-fill me-2"></i>Mapeamento de Rotas
                        </h5>
                        <div class="d-flex flex-column align-items-center">
                            <input class="form-control w-50 mb-4" type="file" id="arquivoCSV" accept=".csv" required>
                            <button type="submit" id="botaoEnviar" class="btn btn-primario btn-lg px-5 shadow">
                                <span class="spinner-border spinner-border-sm d-none" id="indicadorCarregamento" role="status" aria-hidden="true"></span>
                                <span id="textoBotao"><i class="bi bi-send-fill me-2"></i>Processar Rota</span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </div>

    <footer class="text-center py-4 mt-5">
        <p class="mb-1 fw-semibold texto-destaque">Otimização de Rotas - TSP</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
