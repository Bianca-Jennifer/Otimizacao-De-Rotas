services:

  processor:
    image: ghcr.io/project-osrm/osrm-backend
    profiles: ["process"]
    entrypoint: ["/bin/bash", "/entrypoint.sh", "process"]
    volumes:
      - ./osrm:/data
      - ./entrypoint.sh:/entrypoint.sh:ro

  osrm:
    image: ghcr.io/project-osrm/osrm-backend
    container_name: osrm-routed
    entrypoint: ["/bin/bash", "/entrypoint.sh", "serve"]
    environment:
      OSRM_MAX_TABLE_SIZE: ${OSRM_MAX_TABLE_SIZE:-2000}
      OSRM_MAX_TRIP_SIZE: ${OSRM_MAX_TRIP_SIZE:-2000}
    volumes:
      - ./osrm:/data
      - ./entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "${OSRM_PORT:-5000}:5000"
    restart: unless-stopped
