services:

  processor:
    image: ghcr.io/project-osrm/osrm-backend
    profiles: ["process"]
    entrypoint: ["/bin/bash", "/entrypoint.sh", "process"]
    volumes:
      - ./osrm:/data
      - ./entrypoint.sh:/entrypoint.sh:ro

  osrm:
    image: ghcr.io/project-osrm/osrm-backend
    container_name: osrm-routed
    entrypoint: ["/bin/bash", "/entrypoint.sh", "serve"]
    environment:
      OSRM_MAX_TABLE_SIZE: ${OSRM_MAX_TABLE_SIZE:-2000}
      OSRM_MAX_TRIP_SIZE: ${OSRM_MAX_TRIP_SIZE:-2000}
    volumes:
      - ./osrm:/data
      - ./entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "${OSRM_PORT:-5000}:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5000' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build: ./api
    container_name: api-rotas
    environment:
      OSRM_URL: ${OSRM_URL:-http://osrm:5000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      osrm:
        condition: service_healthy
    restart: unless-stopped
